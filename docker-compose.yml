services:
  mysql:
    image: mysql:8.0
    container_name: electronics-mysql
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    networks:
      - singitronic

  express:
    build:
      context: .
      dockerfile: server/Dockerfile.dev
    container_name: electronics-express
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "3001:3001"
    volumes:
      - ./server:/app/server
      - ./prisma:/app/prisma
      - /app/server/node_modules
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - singitronic

  nextjs:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: electronics-nextjs
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # Anonymous volumes shadow the host's node_modules and .next so the
      # container uses its own.
      - /app/node_modules
      - /app/.next
    networks:
      - singitronic

  adminer:
    image: adminer:4
    container_name: electronics-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql
    networks:
      - singitronic

volumes:
  mysql_data:

networks:
  singitronic:
    driver: bridge
